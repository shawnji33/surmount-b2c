<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surmount — Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="../sidebar.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --color-brand-600:#406AD0;
  --color-brand-50:#EEF3FC;
  --color-text-primary:#181D27;
  --color-text-secondary:#414651;
  --color-text-tertiary:#717680;
  --color-border-default:#E9EAEB;
  --color-border-strong:#D5D7DA;
  --color-surface:#FFFFFF;
  --color-surface-subtle:#FAFAFA;
  --color-success-text:#316434;
  --color-success-bg:#DCFCE7;
  --color-success-dot:#16A34A;
  --font-display:'Inter',sans-serif;
  --font-body:'Geist',system-ui,sans-serif;
  --radius-sm:6px;
  --radius-md:8px;
  --radius-lg:12px;
  --radius-full:9999px;
  --shadow-card:0 1px 3px rgba(10,13,18,0.06),0 1px 2px rgba(10,13,18,0.04);
  --shadow-sm:0 1px 2px rgba(10,13,18,0.05);
}

html,body{height:100%;background:var(--color-surface-subtle);font-family:var(--font-body);color:var(--color-text-primary);}

/* ── Shell ── */
.shell{display:flex;height:100vh;overflow:hidden;}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}

/* ── Page header ── */
.page-header{
  display:flex;flex-direction:column;gap:20px;
  padding:24px 24px 16px;
  background:var(--color-surface-subtle);
  flex-shrink:0;
}
.page-header-top{
  display:flex;align-items:center;justify-content:space-between;
}
.page-title{
  font-family:var(--font-body);font-size:18px;font-weight:600;
  color:rgba(10,13,18,0.9);letter-spacing:-0.3px;
}

.search-bar{
  display:flex;align-items:center;gap:8px;
  border:1px solid rgba(0,0,0,0.06);
  border-radius:var(--radius-md);
  padding:8px 12px;
  background:var(--color-surface);
  width:320px;
  box-shadow:0 2px 12px rgba(10,13,18,0.03);
  cursor:text;
}
.search-bar svg{flex-shrink:0;color:var(--color-text-tertiary);}
.search-bar input{
  border:none;outline:none;background:transparent;
  font-family:var(--font-body);font-size:16px;color:var(--color-text-primary);
  flex:1;min-width:0;
}
.search-bar input::placeholder{color:var(--color-text-tertiary);}
.search-kbd{
  font-family:var(--font-body);font-size:12px;font-weight:500;
  color:var(--color-text-tertiary);
  border:1px solid var(--color-border-default);
  border-radius:4px;padding:1px 4px;white-space:nowrap;flex-shrink:0;
}

/* ── Tabs pill ── */
.tabs{
  display:flex;
  background:var(--color-surface-subtle);
  border:1px solid var(--color-border-default);
  border-radius:var(--radius-lg);
  padding:6px;
  gap:4px;
  flex-shrink:0;
}
.tab-btn{
  flex:1;display:flex;align-items:center;justify-content:center;
  height:44px;
  font-family:var(--font-body);font-size:16px;font-weight:500;
  color:var(--color-text-tertiary);
  border:none;background:transparent;cursor:pointer;
  border-radius:var(--radius-sm);
  transition:background .12s,color .12s;
  white-space:nowrap;overflow:hidden;
}
.tab-btn.active{
  background:var(--color-surface);
  color:var(--color-text-secondary);
}
.tab-btn:not(.active):hover{color:var(--color-text-secondary);}

/* ── Scrollable content ── */
.content{flex:1;overflow-y:auto;padding:24px;}
.content::-webkit-scrollbar{width:6px;}
.content::-webkit-scrollbar-track{background:transparent;}
.content::-webkit-scrollbar-thumb{background:var(--color-border-strong);border-radius:3px;}

/* ── Featured categories ── */
.section-title{
  font-family:var(--font-display);font-size:20px;font-weight:500;
  color:#000;margin-bottom:16px;letter-spacing:0;
}

.categories-scroll{
  display:flex;gap:20px;overflow-x:auto;padding-bottom:4px;
  scrollbar-width:none;-ms-overflow-style:none;
}
.categories-scroll::-webkit-scrollbar{display:none;}

.category-card{
  flex-shrink:0;width:240px;height:158px;
  border-radius:var(--radius-md);
  border:3px solid rgba(10,13,18,0.1);
  position:relative;overflow:hidden;cursor:pointer;
}

/* layers inside each card */
.cat-layer{
  position:absolute;inset:-3px;
  background-size:cover;background-position:center;
  width:calc(100% + 6px);height:calc(100% + 6px);
}
.cat-layer img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;
}
.cat-layer.blurred-20{filter:blur(20px);}
.cat-layer.blurred-12{filter:blur(12px);}
.cat-layer.blurred-10{filter:blur(10px);}
.cat-layer.blurred-6{filter:blur(6px);}
.cat-layer.dim-25::after{
  content:'';position:absolute;inset:0;background:rgba(0,0,0,0.25);
}
.cat-layer.dim-navy::after{
  content:'';position:absolute;inset:0;background:rgba(11,0,76,0.25);
}
.cat-layer.opacity-60{opacity:0.6;}

.cat-texture{
  position:absolute;inset:-3px;
  mix-blend-mode:overlay;
  background-position:top left;background-repeat:repeat;
}
.cat-texture.opacity-39{opacity:0.39;}

/* label */
.cat-label{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:32px;font-weight:700;
  letter-spacing:0.64px;line-height:1.1;
  color:white;text-align:center;
  mix-blend-mode:overlay;
  text-shadow:0 4px 37px rgba(0,0,0,0.6);
  pointer-events:none;
}
.cat-label.fs-36{font-size:36px;letter-spacing:0.72px;}
.cat-label.fs-40{font-size:40px;letter-spacing:0.8px;}

/* ── Filter bar ── */
.filter-bar{
  display:flex;align-items:center;gap:10px;
  margin:20px 0 16px;
}
.filter-search{
  display:flex;align-items:center;gap:8px;
  border:1px solid var(--color-border-default);
  border-radius:var(--radius-md);padding:7px 12px;
  background:var(--color-surface);flex:1;max-width:280px;
  transition:border-color .12s;
}
.filter-search:focus-within{border-color:var(--color-brand-600);}
.filter-search svg{flex-shrink:0;color:var(--color-text-tertiary);}
.filter-search input{
  border:none;outline:none;background:transparent;
  font-family:var(--font-body);font-size:13px;color:var(--color-text-primary);flex:1;
}
.filter-search input::placeholder{color:var(--color-text-tertiary);}

.filter-controls{display:flex;align-items:center;gap:8px;margin-left:auto;}
.filter-select{
  display:flex;align-items:center;gap:6px;
  border:1px solid var(--color-border-default);border-radius:var(--radius-md);
  padding:7px 10px;background:var(--color-surface);cursor:pointer;
  font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--color-text-secondary);
  transition:border-color .12s;white-space:nowrap;
}
.filter-select:hover{border-color:var(--color-border-strong);}
.filter-select svg{flex-shrink:0;color:var(--color-text-tertiary);}

.filter-btn{
  display:flex;align-items:center;gap:6px;
  border:1px solid var(--color-border-default);border-radius:var(--radius-md);
  padding:7px 12px;background:var(--color-surface);cursor:pointer;
  font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--color-text-secondary);
  transition:border-color .12s, background .12s;
}
.filter-btn:hover{border-color:var(--color-border-strong);background:var(--color-surface-subtle);}

/* ── Strategy grid ── */
.strategy-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:24px;
}
@media(max-width:900px){.strategy-grid{grid-template-columns:repeat(2,1fr);}}

/* ── Strategy card ── */
.strategy-card{
  background:var(--color-surface);
  border:1px solid var(--color-border-default);
  border-radius:var(--radius-md);
  overflow:hidden;cursor:pointer;
  transition:border-color .15s;
  text-decoration:none;color:inherit;display:block;
}
.strategy-card:hover{
  border-color:var(--color-border-strong);
  background:var(--color-surface-subtle);
}

.strategy-cover{
  position:relative;height:132px;overflow:hidden;
}
.strategy-cover img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.strategy-cover-gradient{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(20,14,0,0) 30%,rgba(20,14,0,0.55) 100%);
}
.strategy-cover-name{
  position:absolute;bottom:12px;left:14px;right:14px;
  font-family:var(--font-display);font-size:14px;font-weight:600;
  color:#fff;line-height:1.3;letter-spacing:-0.2px;
  text-shadow:0 1px 4px rgba(0,0,0,0.5);
}

.strategy-info{
  padding:14px 14px 16px;
  display:flex;flex-direction:column;gap:10px;
}
.strategy-row{
  display:flex;align-items:center;justify-content:space-between;
}
.strategy-row-label{
  font-family:var(--font-body);font-size:13px;color:var(--color-text-tertiary);font-weight:400;
}
.strategy-row-value{
  font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--color-text-primary);
}
.strategy-row-value.positive{color:var(--color-success-text);}

.holdings-avatars{
  display:flex;align-items:center;flex-direction:row-reverse;
}
.holding-av{
  width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--color-surface);
  background:var(--color-surface-subtle);
  overflow:hidden;margin-left:-5px;flex-shrink:0;
  box-shadow:0 0 0 0.5px rgba(0,0,0,0.08);
}
.holding-av:last-child{margin-left:0;}
.holding-av img{width:100%;height:100%;object-fit:contain;display:block;}

.risk-badge{
  display:flex;align-items:center;gap:5px;
}
.risk-dot{width:7px;height:7px;border-radius:50%;background:var(--color-success-dot);flex-shrink:0;}
.risk-dot.medium{background:#ca8a04;}
.risk-dot.high{background:#dc2626;}

/* ── Empty tab ── */
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.managers-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 24px;gap:12px;text-align:center;
}
.managers-empty-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--color-text-primary);}
.managers-empty-sub{font-size:14px;color:var(--color-text-tertiary);max-width:320px;line-height:1.5;}
</style>
</head>
<body>
<div class="shell">
  <app-sidebar active="marketplace"></app-sidebar>

  <div class="main">

    <!-- Page header -->
    <div class="page-header">
      <div class="page-header-top">
        <span class="page-title">Market</span>
        <div class="search-bar">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="none">
            <path d="M14 14L10.0667 10.0667M11.3333 6.66667C11.3333 9.244 9.244 11.3333 6.66667 11.3333C4.08934 11.3333 2 9.244 2 6.66667C2 4.08934 4.08934 2 6.66667 2C9.244 2 11.3333 4.08934 11.3333 6.66667Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input type="text" placeholder="Find an investment" id="header-search">
          <span class="search-kbd">⌘K</span>
        </div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('strategies', this)">Strategies</button>
        <button class="tab-btn" onclick="switchTab('managers', this)">Managers</button>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="content">

      <!-- Strategies tab -->
      <div class="tab-panel active" id="tab-strategies">

        <!-- Featured categories -->
        <div class="section-title">Featured categories</div>
        <div class="categories-scroll">

          <!-- Most Popular -->
          <div class="category-card" onclick="filterCategory('Most Popular')">
            <div class="cat-layer blurred-20"><img src="../assets/category-bg/most-popular-bg.webp" alt=""></div>
            <div class="cat-texture" style="background-image:url('../assets/category-bg/texture-twins.webp');background-size:242px 242px;"></div>
            <div class="cat-label">Most<br>Popular</div>
          </div>

          <!-- Top Gainers -->
          <div class="category-card" onclick="filterCategory('Top Gainers')">
            <div class="cat-layer"><img src="../assets/category-bg/top-gainers-bg.webp" alt=""></div>
            <div class="cat-texture" style="background-image:url('../assets/category-bg/texture-pixels.webp');background-size:161px 161px;"></div>
            <div class="cat-label">Top Gainers<br>(2024)</div>
          </div>

          <!-- Crypto -->
          <div class="category-card" onclick="filterCategory('Crypto')">
            <div class="cat-layer blurred-20"><img src="../assets/category-bg/crypto-bg.webp" alt=""></div>
            <div class="cat-texture" style="background-image:url('../assets/category-bg/texture-crypto.webp');background-size:174px 114px;"></div>
            <div class="cat-label fs-36">Crypto</div>
          </div>

          <!-- Long-term -->
          <div class="category-card" onclick="filterCategory('Long-term')">
            <div class="cat-layer opacity-60"><img src="../assets/category-bg/longterm-bg.webp" alt=""></div>
            <div class="cat-layer" style="mix-blend-mode:multiply;"><img src="../assets/category-bg/longterm-mesh.webp" alt="" style="mix-blend-mode:overlay;"></div>
            <div class="cat-texture" style="background-image:url('../assets/category-bg/texture-lines.webp');background-size:138px 143px;"></div>
            <div class="cat-label fs-36">Long-term</div>
          </div>

          <!-- Equity Focused -->
          <div class="category-card" onclick="filterCategory('Equity')">
            <div class="cat-layer blurred-20"><img src="../assets/category-bg/crypto-bg.webp" alt=""></div>
            <div class="cat-layer blurred-10 dim-25"><img src="../assets/category-bg/equity-bg.webp" alt=""></div>
            <div class="cat-texture opacity-39" style="background-image:url('../assets/category-bg/texture-metal.webp');background-size:1000px 500px;"></div>
            <div class="cat-label">Equity<br>Focused</div>
          </div>

          <!-- Quantum -->
          <div class="category-card" onclick="filterCategory('Quantum')">
            <div class="cat-layer blurred-6 dim-navy"><img src="../assets/category-bg/quantum-bg.webp" alt=""></div>
            <div class="cat-texture" style="background-image:url('../assets/category-bg/texture-retro.webp');background-size:73px 88px;"></div>
            <div class="cat-label fs-36">Quantum</div>
          </div>

          <!-- Copy Trading -->
          <div class="category-card" onclick="filterCategory('Copy Trading')">
            <div class="cat-layer"><img src="../assets/category-bg/copy-trading-bg.webp" alt=""></div>
            <div class="cat-texture" style="background-image:url('../assets/category-bg/texture-twins.webp');background-size:242px 242px;"></div>
            <div class="cat-label">Copy Trading</div>
          </div>

          <!-- AI -->
          <div class="category-card" onclick="filterCategory('AI')">
            <div class="cat-layer blurred-12"><img src="../assets/category-bg/ai-bg.webp" alt=""></div>
            <div class="cat-texture" style="background-image:url('../assets/category-bg/texture-stairs.webp');background-size:40px 40px;"></div>
            <div class="cat-label fs-40">AI</div>
          </div>

          <!-- Swing Trading -->
          <div class="category-card" onclick="filterCategory('Swing Trading')">
            <div class="cat-layer blurred-6 dim-25"><img src="../assets/category-bg/swing-trading-bg.webp" alt=""></div>
            <div class="cat-texture" style="background-image:url('../assets/category-bg/texture-wave.webp');background-size:74px 74px;"></div>
            <div class="cat-label">Swing<br>Trading</div>
          </div>

        </div>

        <!-- Filter bar -->
        <div class="filter-bar">
          <div class="filter-search">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M14 14L10.0667 10.0667M11.3333 6.66667C11.3333 9.244 9.244 11.3333 6.66667 11.3333C4.08934 11.3333 2 9.244 2 6.66667C2 4.08934 4.08934 2 6.66667 2C9.244 2 11.3333 4.08934 11.3333 6.66667Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input type="text" placeholder="Search a strategy" id="grid-search" oninput="filterStrategies()">
          </div>
          <div class="filter-controls">
            <div class="filter-select">
              Category
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="filter-select">
              Sort by
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="filter-btn">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M4 8h8M6 12h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              Filter
            </div>
          </div>
        </div>

        <!-- Strategy grid -->
        <div class="strategy-grid" id="strategy-grid">
          <!-- Cards injected by JS -->
        </div>

      </div>

      <!-- Managers tab -->
      <div class="tab-panel" id="tab-managers">
        <div class="managers-empty">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="14" r="7" stroke="#D5D7DA" stroke-width="2"/><path d="M6 36c0-7.732 6.268-14 14-14s14 6.268 14 14" stroke="#D5D7DA" stroke-width="2" stroke-linecap="round"/></svg>
          <div class="managers-empty-title">Managers coming soon</div>
          <div class="managers-empty-sub">Browse and follow professional portfolio managers. Check back soon.</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const STRATEGIES = [
  { name: "Quantum Computing Leaders",     cover: "../assets/strategy-covers/Quantum Computing Leaders.png",    return: "+13.25%", risk: "Low" },
  { name: "AI Innovators",                 cover: "../assets/strategy-covers/AI Innovators.png",                return: "+18.40%", risk: "Low" },
  { name: "Biotech Breakthroughs",         cover: "../assets/strategy-covers/Biotech Breakthroughs.png",        return: "+9.80%",  risk: "Medium" },
  { name: "Deep Tech",                     cover: "../assets/strategy-covers/Deep Tech.png",                    return: "+21.15%", risk: "Low" },
  { name: "Green Investing",               cover: "../assets/strategy-covers/Green Investing.png",              return: "+7.60%",  risk: "Low" },
  { name: "Next-Gen Data Infrastructure",  cover: "../assets/strategy-covers/Next-Gen Data Infrastructure.png", return: "+14.90%", risk: "Medium" },
  { name: "Aerospace and Defense",         cover: "../assets/strategy-covers/Aerospace and Defense.png",        return: "+11.30%", risk: "Medium" },
  { name: "Bitcoin Momentum Follower",     cover: "../assets/strategy-covers/Bitcoin Momentum Follower.png",    return: "+42.10%", risk: "High" },
  { name: "Sustainable Future",            cover: "../assets/strategy-covers/Sustainable Future.png",           return: "+8.75%",  risk: "Low" },
  { name: "Robotics & Automation",         cover: "../assets/strategy-covers/Robotics & Automation Advancements.png", return: "+16.50%", risk: "Low" },
  { name: "FinTech Startups",              cover: "../assets/strategy-covers/Creative Disruption.png",          return: "+19.20%", risk: "High" },
  { name: "Recession Resistant",           cover: "../assets/strategy-covers/Recession Resistant.png",          return: "+5.40%",  risk: "Low" },
  { name: "T. Rowe Dividend Growth",       cover: "../assets/strategy-covers/T Rowe Dividend Growth Tracker.png", return: "+10.90%", risk: "Low" },
  { name: "Monte Balanced Equities",       cover: "../assets/strategy-covers/Monte Balanced Equities.webp",     return: "+12.30%", risk: "Low" },
  { name: "ETH Momentum Follower",         cover: "../assets/strategy-covers/ETH Momentum Follower.png",        return: "+38.70%", risk: "High" },
];

const HOLDINGS = [
  "../assets/logos/NVDA.webp",
  "../assets/logos/AAPL.webp",
  "../assets/logos/MSFT.webp",
  "../assets/logos/GOOG.webp",
  "../assets/logos/AMZN.webp",
  "../assets/logos/META.webp",
  "../assets/logos/TSLA.webp",
];

function holdingsHTML(offset = 0) {
  const picks = [0,1,2,3].map(i => HOLDINGS[(i + offset) % HOLDINGS.length]);
  return `<div class="holdings-avatars">` +
    picks.reverse().map(src => `<div class="holding-av"><img src="${src}" alt=""></div>`).join('') +
    `</div>`;
}

function riskDotClass(risk) {
  if (risk === 'Medium') return 'risk-dot medium';
  if (risk === 'High') return 'risk-dot high';
  return 'risk-dot';
}

function renderCards(list) {
  const grid = document.getElementById('strategy-grid');
  if (!list.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--color-text-tertiary);font-size:14px;">No strategies match your search.</div>`;
    return;
  }
  grid.innerHTML = list.map((s, i) => `
    <a class="strategy-card" href="../home/strategy-detail.html">
      <div class="strategy-cover">
        <img src="${s.cover}" alt="${s.name}" loading="lazy">
        <div class="strategy-cover-gradient"></div>
        <div class="strategy-cover-name">${s.name}</div>
      </div>
      <div class="strategy-info">
        <div class="strategy-row">
          <span class="strategy-row-label">Top holdings</span>
          ${holdingsHTML(i)}
        </div>
        <div class="strategy-row">
          <span class="strategy-row-label">1-Year Return</span>
          <span class="strategy-row-value positive">${s.return}</span>
        </div>
        <div class="strategy-row">
          <span class="strategy-row-label">Risk</span>
          <div class="risk-badge">
            <span class="${riskDotClass(s.risk)}"></span>
            <span class="strategy-row-value">${s.risk}</span>
          </div>
        </div>
      </div>
    </a>`).join('');
}

function filterStrategies() {
  const q = document.getElementById('grid-search').value.toLowerCase();
  renderCards(q ? STRATEGIES.filter(s => s.name.toLowerCase().includes(q)) : STRATEGIES);
}

function filterCategory(cat) {
  document.getElementById('grid-search').value = cat;
  filterStrategies();
  document.getElementById('grid-search').value = '';
  // Just visual feedback — scroll to grid
  document.getElementById('strategy-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

// ⌘K focuses search
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('header-search').focus();
  }
});

// Initial render
renderCards(STRATEGIES);
</script>
</body>
</html>
