<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invest — Surmount</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<script src="../sidebar.js"></script>
<style>
:root{
  --b600:#406AD0; --b700:#3757BE;
  --text-primary:#181D27;
  --text-secondary:rgba(10,13,18,0.7);
  --text-tertiary:rgba(10,13,18,0.6);
  --text-disabled:rgba(10,13,18,0.4);
  --border-default:rgba(0,0,0,0.06);
  --surface-bg:#FAFAFA;
  --surface-secondary:#F5F5F5;
  --radius-xl:12px; --radius-md:8px;
  --shadow-card:0px 2px 12px 0px rgba(10,13,18,0.03);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Geist','Inter',sans-serif;background:var(--surface-bg);min-height:100vh;}

/* ── Layout ── */
.shell{display:flex;height:100vh;overflow:hidden;}
.page{
  flex:1;min-width:0;height:100%;
  display:flex;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:48px 40px;
}

/* ── Entrance animation ── */
@keyframes page-slide-up{
  from{opacity:0;transform:translateY(22px);}
  to  {opacity:1;transform:translateY(0);}
}
.invest-container{
  width:100%;max-width:480px;
  display:flex;flex-direction:column;gap:28px;
  opacity:0;
  animation:page-slide-up .52s cubic-bezier(0.16,1,0.3,1) .06s forwards;
}

/* ── Back btn ── */
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:none;border:none;cursor:pointer;padding:0;
  color:var(--text-tertiary);font-size:16px;font-weight:500;font-family:inherit;
  transition:color .12s;
}
.back-btn:hover{color:var(--text-primary);}
.back-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}

/* ── Title ── */
.invest-title{
  font-family:'Inter',sans-serif;
  font-size:24px;font-weight:500;line-height:32px;
  color:var(--text-secondary);
}
.invest-title-name{color:var(--b700);}

/* ── Cards ── */
.invest-card{
  background:#fff;
  border:1px solid var(--border-default);
  border-radius:var(--radius-xl);
  padding:21px;
  box-shadow:var(--shadow-card);
  display:flex;flex-direction:column;gap:16px;
}

/* ── Amount display ── */
@keyframes amount-out{
  from{opacity:1;transform:translateY(0);}
  to  {opacity:0;transform:translateY(-10px);}
}
@keyframes amount-in{
  from{opacity:0;transform:translateY(10px);}
  to  {opacity:1;transform:translateY(0);}
}
.amount-wrap{position:relative;overflow:hidden;height:74px;}
.amount-display{
  font-family:'Inter',sans-serif;
  font-size:64px;font-weight:600;
  color:var(--text-disabled);
  line-height:72px;letter-spacing:-2px;
  background:transparent;border:none;outline:none;
  width:100%;cursor:text;
  caret-color:var(--b600);
  padding:0;
}
.amount-display.has-value{color:var(--text-primary);}
.amount-display.anim-out{animation:amount-out .12s cubic-bezier(0.4,0,1,1) forwards;}
.amount-display.anim-in {animation:amount-in  .16s cubic-bezier(0.0,0,0.2,1) forwards;}

/* ── Quick chips ── */
.amount-chips{display:flex;gap:8px;flex-wrap:wrap;}
.amount-chip{
  height:32px;padding:0 12px;
  background:var(--surface-secondary);
  border:none;border-radius:10px;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  color:rgba(10,13,18,0.7);
  cursor:pointer;user-select:none;
  transition:background .1s,transform .08s;
  white-space:nowrap;
}
.amount-chip:hover{background:#EBEBEB;}
.amount-chip:active{background:#E0E0E0;transform:scale(0.95);}

/* ── Repeat card ── */
.repeat-top{display:flex;align-items:center;justify-content:space-between;}
.repeat-left{display:flex;align-items:center;gap:10px;}
.repeat-label{font-size:14px;font-weight:400;color:var(--text-secondary);line-height:20px;}

/* Toggle */
.toggle{
  width:44px;height:24px;
  background:var(--surface-secondary);
  border-radius:9999px;padding:2px;
  cursor:pointer;position:relative;
  transition:background .22s;flex-shrink:0;border:none;
}
.toggle.on{background:var(--b600);}
.toggle-knob{
  width:20px;height:20px;border-radius:50%;background:#fff;
  box-shadow:0px 1px 3px rgba(10,13,18,0.1),0px 1px 2px -1px rgba(10,13,18,0.1);
  position:absolute;top:2px;left:2px;
  transition:transform .2s cubic-bezier(0.4,0,0.2,1);
}
.toggle.on .toggle-knob{transform:translateX(20px);}

/* Frequency pill */
.freq-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--surface-secondary);
  border-radius:10px;padding:10px 16px;
  cursor:pointer;border:none;
  font-family:'Geist',sans-serif;font-size:14px;font-weight:500;
  color:var(--text-secondary);
  opacity:0;pointer-events:none;
  transition:opacity .2s ease, background .12s;
}
.freq-pill.visible{opacity:1;pointer-events:all;}
.freq-pill:hover{background:#EBEBEB;}
.freq-pill svg{width:14px;height:14px;stroke:rgba(10,13,18,0.4);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}

/* Starts row */
.starts-row{
  display:flex;align-items:center;justify-content:flex-end;gap:6px;
  overflow:hidden;
  max-height:0;
  margin-top:-16px; /* cancel card gap when collapsed */
  opacity:0;
  transition:max-height .28s cubic-bezier(0.16,1,0.3,1),
             margin-top  .28s cubic-bezier(0.16,1,0.3,1),
             opacity     .18s ease;
}
.starts-row.visible{max-height:32px;margin-top:0;opacity:1;}
.starts-label{font-size:14px;font-weight:400;color:var(--text-secondary);line-height:20px;}
.starts-row svg{width:16px;height:16px;stroke:rgba(10,13,18,0.4);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;cursor:pointer;}

/* ── Pay with section ── */
.pay-with-section{display:flex;flex-direction:column;gap:10px;}
.pay-with-label{font-size:14px;font-weight:500;color:var(--text-tertiary);line-height:20px;}
.pay-with-row{display:flex;align-items:center;justify-content:space-between;}

.broker-select{
  display:inline-flex;align-items:center;gap:8px;
  background:#fff;
  border:1px solid var(--border-default);
  border-radius:var(--radius-md);
  padding:8px 12px;
  cursor:pointer;
  box-shadow:var(--shadow-card);
  transition:border-color .12s;
}
.broker-select:hover{border-color:rgba(0,0,0,0.12);}
.broker-avatar{
  width:24px;height:24px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  border:0.5px solid rgba(0,0,0,0.08);
}
.broker-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.broker-name-text{font-size:14px;font-weight:400;color:rgba(10,13,18,0.9);line-height:20px;white-space:nowrap;}
.broker-chevron svg{width:16px;height:16px;stroke:rgba(10,13,18,0.4);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.available-text{
  font-size:14px;font-weight:400;color:var(--text-tertiary);
  font-family:'Inter',sans-serif;white-space:nowrap;
}

/* ── Review button ── */
.review-btn{
  width:100%;padding:10px 16px;
  background:var(--surface-secondary);
  border:1px solid #E9EAEB;
  border-radius:var(--radius-md);
  font-family:inherit;font-size:16px;font-weight:500;
  color:#A4A7AE;cursor:not-allowed;
  transition:background .15s,color .15s,border-color .15s;
  display:flex;align-items:center;justify-content:center;
}
.review-btn.enabled{
  background:var(--b600);border-color:var(--b600);
  color:#fff;cursor:pointer;
}
.review-btn.enabled:hover{background:var(--b700);border-color:var(--b700);}
</style>
</head>
<body>

<div class="shell">
  <app-sidebar active="builder"></app-sidebar>

  <main class="page">
    <div class="invest-container">

      <!-- Back -->
      <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back
      </button>

      <!-- Title -->
      <h1 class="invest-title">Invest in <span class="invest-title-name" id="invest-strategy-name">"AI Leaders"</span></h1>

      <!-- Amount card -->
      <div class="invest-card">
        <div class="amount-wrap">
          <input
            class="amount-display"
            id="amount-display"
            type="text"
            inputmode="decimal"
            value="$100"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div class="amount-chips">
          <button class="amount-chip" onclick="setAmount(100)">$100</button>
          <button class="amount-chip" onclick="setAmount(500)">$500</button>
          <button class="amount-chip" onclick="setAmount(1000)">$1,000</button>
          <button class="amount-chip" onclick="setAmount(5000)">$5,000</button>
          <button class="amount-chip" onclick="setAmount('max')">Max</button>
        </div>
      </div>

      <!-- Repeat card -->
      <div class="invest-card">
        <div class="repeat-top">
          <div class="repeat-left">
            <span class="repeat-label">Repeat</span>
            <button class="toggle" id="repeat-toggle" onclick="toggleRepeat()">
              <div class="toggle-knob"></div>
            </button>
          </div>
          <button class="freq-pill" id="freq-pill">
            <span>Monthly</span>
            <svg viewBox="0 0 14 14"><polyline points="3 5 7 9 11 5"/></svg>
          </button>
        </div>
        <div class="starts-row" id="starts-row">
          <span class="starts-label">Starts Today</span>
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
      </div>

      <!-- Pay with -->
      <div class="pay-with-section">
        <span class="pay-with-label">Pay with</span>
        <div class="pay-with-row">
          <button class="broker-select">
            <div class="broker-avatar">
              <img src="../assets/brokers/robinhood.png" alt="Robinhood"/>
            </div>
            <span class="broker-name-text">Robinhood</span>
            <span class="broker-chevron">
              <svg viewBox="0 0 16 16"><polyline points="4 6 8 10 12 6"/></svg>
            </span>
          </button>
          <span class="available-text">$323,412.42 available</span>
        </div>
      </div>

      <!-- Review -->
      <button class="review-btn" id="review-btn">Review</button>

    </div>
  </main>
</div>

<script>
  /* Strategy name from URL */
  const params = new URLSearchParams(location.search);
  const strat = params.get('strategy');
  if (strat) document.getElementById('invest-strategy-name').textContent = `"${strat}"`;

  /* ── Amount state ── */
  let rawAmount = 0; // 0 = untouched (placeholder state)
  const displayEl = document.getElementById('amount-display');
  const reviewBtn = document.getElementById('review-btn');

  function setDisplay(val, formatted) {
    displayEl.value = formatted;
    displayEl.classList.toggle('has-value', val > 0);
    reviewBtn.classList.toggle('enabled', val > 0);
  }

  function flipTo(val) {
    const formatted = val > 0 ? '$' + val.toLocaleString() : '';
    // Animate out
    displayEl.classList.remove('anim-in');
    displayEl.classList.add('anim-out');
    setTimeout(() => {
      displayEl.value = formatted;
      displayEl.classList.toggle('has-value', val > 0);
      reviewBtn.classList.toggle('enabled', val > 0);
      displayEl.classList.remove('anim-out');
      displayEl.classList.add('anim-in');
      setTimeout(() => displayEl.classList.remove('anim-in'), 200);
    }, 110);
  }

  function setAmount(val) {
    const newAmt = val === 'max' ? 8221 : val;
    rawAmount = newAmt;
    flipTo(newAmt);
  }

  /* Direct typing — $ always stays */
  displayEl.addEventListener('focus', function() {
    // Strip commas, keep $, select the number portion
    const num = this.value.replace(/[$,]/g, '');
    this.value = '$' + num;
    setTimeout(() => this.setSelectionRange(1, this.value.length), 0);
  });

  displayEl.addEventListener('keydown', function(e) {
    // Prevent erasing the $ sign
    if (e.key === 'Backspace' && this.selectionStart === 1 && this.selectionEnd === 1) {
      e.preventDefault();
    }
  });

  displayEl.addEventListener('input', function() {
    const cursor = this.selectionStart;
    // Keep only digits after $, re-prefix
    const num = this.value.replace(/[^0-9]/g, '');
    this.value = '$' + num;
    // Restore cursor after the $
    const pos = Math.max(1, cursor);
    try { this.setSelectionRange(pos, pos); } catch(_) {}
    rawAmount = parseInt(num) || 0;
    this.classList.toggle('has-value', rawAmount > 0);
    reviewBtn.classList.toggle('enabled', rawAmount > 0);
  });

  displayEl.addEventListener('blur', function() {
    if (rawAmount > 0) {
      this.value = '$' + rawAmount.toLocaleString();
      this.classList.add('has-value');
    } else {
      this.value = '$';
      this.classList.remove('has-value');
    }
  });

  /* ── Repeat toggle ── */
  const toggleEl  = document.getElementById('repeat-toggle');
  const freqPill  = document.getElementById('freq-pill');
  const startsRow = document.getElementById('starts-row');
  let repeatOn = false;

  function toggleRepeat() {
    repeatOn = !repeatOn;
    toggleEl.classList.toggle('on', repeatOn);
    freqPill.classList.toggle('visible', repeatOn);
    startsRow.classList.toggle('visible', repeatOn);
  }
</script>

</body>
</html>
