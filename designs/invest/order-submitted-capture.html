<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Submitted — Capture</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-base-white:#FFFFFF;
  --color-gray-50:#FAFAFA;--color-gray-100:#F5F5F5;--color-gray-200:#E9EAEB;
  --color-gray-500:#717680;--color-gray-700:#414651;--color-gray-900:#181D27;
  --color-brand-600:#406AD0;
  --color-text-primary:#181D27;
  --color-text-secondary:rgba(10,13,18,0.7);
  --color-text-tertiary:#717680;
  --color-surface-subtle:#FAFAFA;
  --font-family-body:'Geist',system-ui,sans-serif;
  --text-xs:12px;--text-sm:14px;--text-md:16px;
  --font-weight-medium:500;--font-weight-semibold:600;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;
  --radius-md:8px;--radius-full:9999px;
}
body{
  font-family:var(--font-family-body);font-size:var(--text-sm);
  color:var(--color-text-primary);background:#F0F0F0;
  -webkit-font-smoothing:antialiased;letter-spacing:-0.5px;
  display:flex;align-items:flex-start;justify-content:center;
  padding:40px;
}
.widget{
  background:#fff;border:1px solid rgba(0,0,0,0.06);
  border-radius:12px;width:360px;display:flex;flex-direction:column;overflow:hidden;
}
/* Header */
.wt-submitted-header{
  padding:20px 20px 4px;display:flex;flex-direction:column;gap:4px;
}
.wt-submitted-title{
  font-size:20px;font-weight:600;color:#181D27;letter-spacing:-0.5px;line-height:1.3;
}
.wt-submitted-time{font-size:14px;color:#717680;font-weight:400;letter-spacing:-0.3px;}
/* Rows */
.wt-submitted-body{
  padding:16px 20px 8px;display:flex;flex-direction:column;
}
.wt-row{
  display:flex;align-items:center;justify-content:space-between;padding:8px 0;
}
.wt-key{font-size:14px;color:rgba(10,13,18,0.7);font-weight:500;letter-spacing:0;width:160px;flex-shrink:0;}
.wt-val{font-size:14px;color:rgba(10,13,18,0.9);font-weight:400;letter-spacing:0;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;flex:1;}
.wt-acct{display:flex;align-items:center;gap:8px;justify-content:flex-end;flex:1;}
.wt-acct .wt-val{flex:none}
.acct-logo{
  width:18px;height:18px;border-radius:4px;border:0.5px solid rgba(0,0,0,0.08);
  overflow:hidden;flex-shrink:0;padding:0.5px;
}
.acct-logo img{width:100%;height:100%;object-fit:cover;display:block;border-radius:3px}
/* Footer */
.wt-submitted-footer{
  padding:16px 20px 20px;display:flex;flex-direction:column;gap:12px;
  border-top:1px solid rgba(0,0,0,0.06);
}
.btn-done{
  width:100%;padding:11px 14px;
  background:#181D27;border:none;border-radius:9999px;
  font-family:var(--font-family-body);font-size:14px;font-weight:600;
  color:#fff;cursor:pointer;letter-spacing:-0.3px;
}
.btn-view-details{
  width:100%;padding:11px 14px;
  background:transparent;border:1px solid rgba(0,0,0,0.10);border-radius:9999px;
  font-family:var(--font-family-body);font-size:14px;font-weight:600;
  color:#181D27;cursor:pointer;letter-spacing:-0.3px;
}
</style>
</head>
<body>

<div class="widget">
  <div class="wt-submitted-header">
    <span class="wt-submitted-title">Order submitted</span>
    <span class="wt-submitted-time">Today at 5:31 pm</span>
  </div>
  <div class="wt-submitted-body">
    <div class="wt-row">
      <span class="wt-key">Strategy</span>
      <span class="wt-val">Quantum Computing</span>
    </div>
    <div class="wt-row">
      <span class="wt-key">Order type</span>
      <span class="wt-val">Market buy</span>
    </div>
    <div class="wt-row">
      <span class="wt-key">Investment amount</span>
      <span class="wt-val">$435,435.00 USD</span>
    </div>
    <div class="wt-row">
      <span class="wt-key">Account</span>
      <div class="wt-acct">
        <div class="acct-logo"><img src="../assets/brokers/robinhood.png" alt="Robinhood"></div>
        <span class="wt-val">Robinhood</span>
      </div>
    </div>
  </div>
  <div class="wt-submitted-footer">
    <div class="wt-row" style="padding:0 0 4px">
      <span class="wt-key">Estimated cost</span>
      <span class="wt-val">$435,435.00 USD</span>
    </div>
    <button class="btn-done">Done</button>
    <button class="btn-view-details">View details</button>
  </div>
</div>

</body>
</html>
